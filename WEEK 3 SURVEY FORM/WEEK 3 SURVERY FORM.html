<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id="title">Student Feedback Survey</h1>

    <p id="description">
      Please fill out this survey to help us improve our services.
    </p>

    <form id="survey-form">
      
      <!-- Name -->
      <label id="name-label" for="name">Name:</label>
      <input
        id="name"
        type="text"
        placeholder="Enter your name"
        required
      />

      <br /><br />

      <!-- Email -->
      <label id="email-label" for="email">Email:</label>
      <input
        id="email"
        type="email"
        placeholder="Enter your email"
        required
      />

      <br /><br />

      <!-- Number -->
      <label id="number-label" for="number">Age:</label>
      <input
        id="number"
        type="number"
        min="1"
        max="100"
        placeholder="Enter your age"
      />

      <br /><br />

      <!-- Dropdown -->
      <label for="dropdown">Role:</label>
      <select id="dropdown">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>

      <br /><br />

      <!-- Radio buttons -->
      <p>Would you recommend us?</p>
      <label>
        <input type="radio" name="recommend" value="yes" /> Yes
      </label>
      <label>
        <input type="radio" name="recommend" value="no" /> No
      </label>

      <br /><br />

      <!-- Checkboxes -->
      <p>What do you like?</p>
      <label>
        <input type="checkbox" value="design" /> Design
      </label>
      <label>
        <input type="checkbox" value="content" /> Content
      </label>

      <br /><br />

      <!-- Textarea -->
      <label for="comments">Additional Comments:</label>
      <br />
      <textarea id="comments" rows="4" cols="30"></textarea>

      <br /><br />

      <!-- Submit -->
      <button id="submit" type="submit">Submit</button>

    </form>
  </body>
</html>
